name: Publish to Ansible Galaxy

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  publish:
    name: Build and publish collection
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install release tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Verify tag matches collection version
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          import yaml

          tag = os.environ["GITHUB_REF_NAME"]
          normalized_tag = tag[1:] if tag.startswith("v") else tag

          with Path("galaxy.yml").open("r", encoding="utf-8") as handle:
              version = yaml.safe_load(handle)["version"]

          if version != normalized_tag:
              raise SystemExit(
                  f"Tag {tag} does not match galaxy.yml version {version}"
              )
          PY

      - name: Build collection artifact
        run: |
          rm -rf dist
          ansible-galaxy collection build --force --output-path dist

      - name: Publish collection to Galaxy
        env:
          GALAXY_API_TOKEN: ${{ secrets.GALAXY_API_TOKEN }}
        run: |
          artifact="$(find dist -maxdepth 1 -name '*.tar.gz' -print -quit)"
          test -n "$artifact"
          ansible-galaxy collection publish "$artifact" --token "$GALAXY_API_TOKEN"
