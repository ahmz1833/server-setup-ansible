---
- name: "Resolve asset destination: {{ asset_name }}"
  block:
    - name: "Locate installed binary path: {{ asset_name }}"
      ansible.builtin.command: "which {{ asset_name }}"
      register: _asset_which
      failed_when: false
      changed_when: false
      when:
        - asset_dest is undefined
        - (asset_type | default('binary')) == 'binary'

    - name: "Set effective asset destination: {{ asset_name }}"
      ansible.builtin.set_fact:
        _asset_dest: >-
          {%- if asset_dest is defined -%}
            {{ asset_dest }}
          {%- elif _asset_which.rc is defined and _asset_which.rc == 0 -%}
            {{ _asset_which.stdout }}
          {%- else -%}
            /usr/local/bin/{{ asset_name }}
          {%- endif -%}

- name: "Inspect installed asset state: {{ asset_name }}"
  block:
    - name: "Check if asset exists at {{ _asset_dest }}"
      ansible.builtin.stat:
        path: "{{ _asset_dest }}"
      register: _asset_stat

    - name: "Read installed asset version: {{ asset_name }}"
      when: _asset_stat.stat.exists
      block:
        - name: "Get version for binary: {{ asset_name }}"
          ansible.builtin.command: "{{ _asset_dest }} {{ asset_version_cmd }}"
          register: _asset_version_binary
          changed_when: false
          failed_when: false
          when: (asset_type | default('binary')) == 'binary'

        - name: "Get version for file/package: {{ asset_name }}"
          ansible.builtin.slurp:
            src: >-
              {{
                _asset_dest + '/.ansible_version'
                if (asset_type | default('binary')) == 'package'
                else (_asset_dest | dirname) + '/.' + asset_name + '_ansible_version'
              }}
          register: _asset_version_file
          failed_when: false
          when: (asset_type | default('binary')) in ['file', 'package']

        - name: "Parse installed version: {{ asset_name }}"
          ansible.builtin.set_fact:
            _asset_installed_version: >-
              {%- if (asset_type | default('binary')) == 'binary'
                    and _asset_version_binary is defined -%}
                {%- set _out = _asset_version_binary.stdout | default('') ~ _asset_version_binary.stderr | default('') -%}
                {%- set _match = _out | regex_search(asset_version_regex, '\1') -%}
                {{ (_match | first) if _match else '' }}
              {%- elif (asset_type | default('binary')) in ['file', 'package']
                    and _asset_version_file is defined -%}
                {{
                  (_asset_version_file.content | b64decode | trim)
                  if _asset_version_file.content is defined else ''
                }}
              {%- else -%}
                {{ '' }}
              {%- endif -%}

# Split set_fact into two tasks to avoid variable reference timing issues
- name: "Resolve target version: {{ asset_name }}"
  ansible.builtin.set_fact:
    _asset_target_ver: "{{ asset_version | regex_replace('^(>=|==)', '') }}"
    _asset_op: "{{ '==' if asset_version.startswith('==') else '>=' }}"
    _asset_stage_locally: "{{ asset_download_locally | default(false) | bool }}"

- name: "Resolve target asset metadata: {{ asset_name }}"
  ansible.builtin.set_fact:
    _asset_resolved_suffix: >-
      {{
        asset_url
        | replace('%v', _asset_target_ver)
        | regex_replace('^https?://', '')
        | regex_replace('^/+', '')
      }}
    _asset_origin_url: >-
      {{
        (asset_url | replace('%v', _asset_target_ver))
        if (asset_url | replace('%v', _asset_target_ver)) is match('^https?://')
        else (
          asset_origin_scheme
          ~ (asset_url | replace('%v', _asset_target_ver) | regex_replace('^/+', ''))
        )
      }}
    _asset_resolved_extract_src: >-
      {{
        (asset_extract_src | default(asset_name))
        | replace('%v', _asset_target_ver)
      }}
    _asset_use_cache: >-
      {{
        (asset_download_locally | default(false) | bool)
        and (asset_cache_enabled | default(true) | bool)
      }}

- name: "Resolve cache path and URLs: {{ asset_name }}"
  ansible.builtin.set_fact:
    _asset_cache_path: >-
      {{ (asset_cache_dir | regex_replace('/+$', '')) ~ '/' ~ _asset_resolved_suffix }}
    _asset_resolved_url: >-
      {{
        ((asset_mirror_base_url | regex_replace('/+$', '')) ~ '/' ~ _asset_resolved_suffix)
        if (asset_use_mirror | default(false) | bool)
        and (asset_mirror_base_url | default('') | length > 0)
        else _asset_origin_url
      }}
    _asset_install_needed: >-
      {{
        not _asset_stat.stat.exists
        or (_asset_installed_version | default('0.0.0', true))
        is not ansible.builtin.version(_asset_target_ver, _asset_op)
      }}

# Build proxy environment variables
- name: "Build proxy environment: {{ asset_name }}"
  ansible.builtin.set_fact:
    _asset_proxy_env: >-
      {%- set env = {} -%}
      {%- if asset_proxy | default('') | length > 0 -%}
        {%- set proxy_url = asset_proxy -%}
        {%- if asset_proxy_username | default('') | length > 0 -%}
          {%- set proto = proxy_url.split('://')[0] -%}
          {%- set host = proxy_url.split('://')[1] -%}
          {%- set auth = asset_proxy_username ~ ':' ~ asset_proxy_password | default('') -%}
          {%- set proxy_url = proto ~ '://' ~ auth ~ '@' ~ host -%}
        {%- endif -%}
        {%- set _ = env.update({
          'http_proxy': proxy_url,
          'https_proxy': proxy_url,
          'HTTP_PROXY': proxy_url,
          'HTTPS_PROXY': proxy_url
        }) -%}
      {%- endif -%}
      {{ env }}

- name: "Check global cache for {{ asset_name }}"
  ansible.builtin.stat:
    path: "{{ _asset_cache_path }}"
  register: _asset_cache_stat
  delegate_to: localhost
  become: false
  when:
    - _asset_install_needed
    - _asset_use_cache

- name: "Update/Install asset: {{ asset_name }}"
  when: _asset_install_needed
  block:
    - name: "Prepare staging paths for {{ asset_name }}"
      block:
        - name: "Ensure cache directory exists for {{ asset_name }}"
          ansible.builtin.file:
            path: "{{ _asset_cache_path | dirname }}"
            state: directory
            mode: '0755'
          delegate_to: localhost
          become: false
          when: _asset_use_cache

        - name: "Download asset into global cache: {{ asset_name }}"
          ansible.builtin.get_url:
            url: "{{ _asset_resolved_url }}"
            dest: "{{ _asset_cache_path }}"
            mode: '0644'
          environment: "{{ _asset_proxy_env }}"
          delegate_to: localhost
          become: false
          when:
            - _asset_use_cache
            - >-
              (asset_cache_force_refresh | default(false) | bool)
              or not (_asset_cache_stat.stat.exists | default(false))

        - name: "Create temporary directory for {{ asset_name }}"
          ansible.builtin.tempfile:
            state: directory
            prefix: "{{ asset_name }}_"
          register: _asset_tempdir
          delegate_to: "{{ 'localhost' if _asset_stage_locally else inventory_hostname }}"
          become: "{{ not _asset_stage_locally }}"

        - name: "Create remote temporary directory for {{ asset_name }}"
          ansible.builtin.tempfile:
            state: directory
            prefix: "{{ asset_name }}_remote_"
          register: _asset_remote_tempdir
          when: _asset_stage_locally

    - name: "Acquire asset payload for {{ asset_name }}"
      block:
        - name: "Handle archive payload for {{ asset_name }}"
          when: asset_extract | default(true) | bool
          block:
            - name: "Extract archive from global cache: {{ asset_name }}"
              ansible.builtin.unarchive:
                src: "{{ _asset_cache_path }}"
                dest: "{{ _asset_tempdir.path }}"
              delegate_to: "{{ 'localhost' if _asset_stage_locally else inventory_hostname }}"
              become: "{{ not _asset_stage_locally }}"
              when: _asset_use_cache

            - name: "Download and extract archive (local staging): {{ asset_name }}"
              ansible.builtin.unarchive:
                src: "{{ _asset_resolved_url }}"
                dest: "{{ _asset_tempdir.path }}"
                remote_src: true
              environment: "{{ _asset_proxy_env }}"
              delegate_to: localhost
              become: false
              when:
                - not _asset_use_cache
                - _asset_stage_locally

            - name: "Download and extract archive (remote): {{ asset_name }}"
              ansible.builtin.unarchive:
                src: "{{ _asset_resolved_url }}"
                dest: "{{ _asset_tempdir.path }}"
                remote_src: true
              environment: "{{ _asset_proxy_env }}"
              when:
                - not _asset_use_cache
                - not _asset_stage_locally

        - name: "Handle raw payload for {{ asset_name }}"
          when: not (asset_extract | default(true) | bool)
          block:
            - name: "Stage raw asset from global cache: {{ asset_name }}"
              ansible.builtin.copy:
                src: "{{ _asset_cache_path }}"
                dest: "{{ _asset_tempdir.path }}/{{ _asset_resolved_extract_src }}"
                mode: '0644'
              delegate_to: "{{ 'localhost' if _asset_stage_locally else inventory_hostname }}"
              become: "{{ not _asset_stage_locally }}"
              when: _asset_use_cache

            - name: "Download raw asset (local staging): {{ asset_name }}"
              ansible.builtin.get_url:
                url: "{{ _asset_resolved_url }}"
                dest: "{{ _asset_tempdir.path }}/{{ _asset_resolved_extract_src }}"
                mode: '0644'
              environment: "{{ _asset_proxy_env }}"
              delegate_to: localhost
              become: false
              when:
                - not _asset_use_cache
                - _asset_stage_locally

            - name: "Download raw asset (remote): {{ asset_name }}"
              ansible.builtin.get_url:
                url: "{{ _asset_resolved_url }}"
                dest: "{{ _asset_tempdir.path }}/{{ _asset_resolved_extract_src }}"
                mode: '0644'
              environment: "{{ _asset_proxy_env }}"
              when:
                - not _asset_use_cache
                - not _asset_stage_locally

    - name: "Stop service before update: {{ asset_name }}"
      ansible.builtin.systemd:
        name: "{{ asset_service_stop }}"
        state: stopped
      failed_when: false
      when: asset_service_stop is defined

    - name: "Compress local payload for transfer: {{ asset_name }}"
      when: _asset_stage_locally
      block:
        - name: "Prepare compressed payload directory for {{ asset_name }}"
          ansible.builtin.file:
            path: "{{ _asset_tempdir.path }}/payload"
            state: directory
            mode: '0755'
          delegate_to: localhost
          become: false

        - name: "Stage binary or file payload for {{ asset_name }}"
          ansible.builtin.copy:
            src: "{{ _asset_tempdir.path }}/{{ _asset_resolved_extract_src }}"
            dest: "{{ _asset_tempdir.path }}/payload/{{ _asset_dest | basename }}"
            remote_src: true
            mode: preserve
          delegate_to: localhost
          become: false
          when: (asset_type | default('binary')) in ['binary', 'file']

        - name: "Stage package payload for {{ asset_name }}"
          ansible.builtin.copy:
            src: >-
              {{ _asset_tempdir.path }}/{{ _asset_resolved_extract_src }}{{
                '' if _asset_resolved_extract_src.endswith('/') else '/'
              }}
            dest: "{{ _asset_tempdir.path }}/payload/"
            remote_src: true
            mode: preserve
          delegate_to: localhost
          become: false
          when: (asset_type | default('binary')) == 'package'

        - name: "Pack payload with max compression: {{ asset_name }}"
          community.general.archive:
            path: "{{ _asset_tempdir.path }}/payload/"
            dest: "{{ _asset_tempdir.path }}/{{ asset_name }}.tar.gz"
            format: gz
            mode: '0644'
          delegate_to: localhost
          become: false

        - name: "Upload and unpack compressed payload: {{ asset_name }}"
          ansible.builtin.unarchive:
            src: "{{ _asset_tempdir.path }}/{{ asset_name }}.tar.gz"
            dest: "{{ _asset_remote_tempdir.path }}"

    - name: "Install asset content for {{ asset_name }}"
      block:
        - name: "Install binary or file to target destination: {{ asset_name }}"
          ansible.builtin.copy:
            src: >-
              {{
                (_asset_remote_tempdir.path ~ '/' ~ (_asset_dest | basename))
                if _asset_stage_locally
                else (_asset_tempdir.path ~ '/' ~ _asset_resolved_extract_src)
              }}
            dest: "{{ _asset_dest }}"
            mode: "{{ '0755' if (asset_type | default('binary')) == 'binary' else '0644' }}"
            owner: root
            group: root
            remote_src: true
          when: (asset_type | default('binary')) in ['binary', 'file']

        - name: "Install package to target destination: {{ asset_name }}"
          when: (asset_type | default('binary')) == 'package'
          block:
            - name: "Ensure package destination directory exists: {{ asset_name }}"
              ansible.builtin.file:
                path: "{{ _asset_dest }}"
                state: directory
                mode: '0755'
                owner: root
                group: root

            # Trailing slash matters: without it, Ansible copies the directory node
            # itself under dest (e.g. .../docker/tmp.xxx/) instead of its contents.
            - name: "Copy package contents to target destination: {{ asset_name }}"
              ansible.builtin.copy:
                src: >-
                  {{
                    (_asset_remote_tempdir.path ~ '/')
                    if _asset_stage_locally
                    else (
                      (_asset_tempdir.path ~ '/' ~ _asset_resolved_extract_src)
                      ~ ('' if _asset_resolved_extract_src.endswith('/') else '/')
                    )
                  }}
                dest: "{{ _asset_dest }}/"
                mode: preserve
                owner: root
                group: root
                remote_src: true

            - name: "Normalize package ownership after extraction: {{ asset_name }}"
              ansible.builtin.file:
                path: "{{ _asset_dest }}"
                state: directory
                recurse: true
                owner: root
                group: root
              when: _asset_stage_locally

        - name: "Write version tracker for non-binary assets: {{ asset_name }}"
          ansible.builtin.copy:
            content: "{{ _asset_target_ver }}"
            dest: >-
              {{
                _asset_dest + '/.ansible_version'
                if (asset_type | default('binary')) == 'package'
                else (_asset_dest | dirname) + '/.' + asset_name + '_ansible_version'
              }}
            mode: '0644'
          when: (asset_type | default('binary')) != 'binary'

  always:
    - name: "Clean up temporary directory for {{ asset_name }}"
      ansible.builtin.file:
        path: "{{ _asset_tempdir.path }}"
        state: absent
      delegate_to: "{{ 'localhost' if _asset_stage_locally else inventory_hostname }}"
      become: "{{ not _asset_stage_locally }}"
      when: _asset_tempdir.path is defined

    - name: "Clean up remote temporary directory for {{ asset_name }}"
      ansible.builtin.file:
        path: "{{ _asset_remote_tempdir.path }}"
        state: absent
      when:
        - _asset_stage_locally
        - _asset_remote_tempdir.path is defined

- name: "Register dynamic fact for asset path"
  ansible.builtin.set_fact:
    "{{ asset_register_path_var }}": "{{ _asset_dest }}"
  when: asset_register_path_var is defined
