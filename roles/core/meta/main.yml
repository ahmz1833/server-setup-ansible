---
collections:
  - community.general
  - ansible.posix

galaxy_info:
  role_name: core
  author: AHMZ
  description: >-
    Core server provisioning and hardening — hostname, timezone, APT mirrors,
    package installation, user management, SSH hardening, sysctl kernel tuning,
    ipset management, iptables INPUT chain firewall, fail2ban intrusion prevention,
    and centralized cron management. Targets systemd-based Linux; firewall rule
    persistence is implemented for Debian and Red Hat family only.
  license: MIT
  min_ansible_version: "2.14"
  platforms:
    - name: Ubuntu
      versions:
        - focal
        - jammy
        - noble
    - name: Debian
      versions:
        - bullseye
        - bookworm
        - trixie
    - name: EL
      versions:
        - "8"
        - "9"
  galaxy_tags:
    - system
    - security
    - hardening
    - firewall
    - iptables
    - ipset
    - ssh
    - sysctl
    - fail2ban
    - users
    - cron

dependencies: []
