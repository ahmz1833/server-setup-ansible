---
- name: Set system timezone
  community.general.timezone:
    name: "{{ core_timezone }}"

- name: Set system hostname
  ansible.builtin.hostname:
    name: "{{ core_hostname }}"

- name: Check /etc/resolv.conf state
  ansible.builtin.stat:
    path: /etc/resolv.conf
  register: core_resolv_conf_stat
  when: core_manage_nameservers

- name: Remove /etc/resolv.conf symlink before managing file
  ansible.builtin.file:
    path: /etc/resolv.conf
    state: absent
  when:
    - core_manage_nameservers
    - core_resolv_conf_stat.stat.islnk | default(false)

- name: Manage /etc/resolv.conf
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      # Managed by Ansible - DO NOT EDIT
      {% for server in core_nameservers %}
      nameserver {{ server }}
      {% endfor %}
  when: core_manage_nameservers

- name: Manage /etc/hosts role section
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: "# {mark} ANSIBLE MANAGED CORE HOSTS"
    block: |
      127.0.0.1 {{ core_hostname }}
      ::1 {{ core_hostname }}
      {% for host_entry in core_hosts_list %}
      {{ host_entry }}
      {% endfor %}
    create: true
    owner: root
    group: root
    mode: '0644'

# -----------------------------------------------------------------------------
# APT Mirror Configuration
# -----------------------------------------------------------------------------
- name: Determine active APT mirror
  ansible.builtin.set_fact:
    core_active_apt_mirror: >-
      {% if core_apt_mirror | default('') | length > 0 %}
      {{ core_apt_mirror }}
      {% elif core_is_iran | default(false) %}
      http://mirror.arvancloud.ir/ubuntu
      {% endif %}

- name: Configure APT mirrors
  when:
    - ansible_facts['os_family'] == 'Debian'
    - core_active_apt_mirror is defined
    - core_active_apt_mirror | trim | length > 0
  block:
    - name: Find core OS APT source files
      ansible.builtin.find:
        paths:
          - /etc/apt/
          - /etc/apt/sources.list.d/
        patterns:
          - "sources.list"
          - "ubuntu.sources"
          - "debian.sources"
      register: core_apt_files

    - name: Backup APT source files before modification
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: "/etc/apt/{{ item.path | basename }}.bak.{{ ansible_facts['date_time']['epoch'] }}"
        remote_src: true
        force: false
        owner: root
        group: root
        mode: '0644'
      loop: "{{ core_apt_files.files | default([]) }}"

    - name: Configure custom APT mirror (Legacy .list format)
      ansible.builtin.replace:
        path: "{{ item.path }}"
        regexp: '^(deb(?:-src)?\s+)https?://[^\s]+(\s+)'
        replace: '\g<1>{{ core_active_apt_mirror | trim }}\g<2>'
      loop: "{{ core_apt_files.files | default([]) }}"
      when: item.path.endswith('.list')

    - name: Configure custom APT mirror (Modern DEB822 .sources format)
      ansible.builtin.replace:
        path: "{{ item.path }}"
        regexp: '^(URIs:\s+)https?://[^\s]+'
        replace: '\g<1>{{ core_active_apt_mirror | trim }}'
      loop: "{{ core_apt_files.files | default([]) }}"
      when: item.path.endswith('.sources')

- name: Update package cache (Debian)
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: "{{ core_apt_cache_valid_time }}"
  when: ansible_facts['os_family'] == 'Debian'

- name: Update package cache (RedHat)
  ansible.builtin.dnf:
    update_cache: true
  become: true
  when: ansible_facts['os_family'] == 'RedHat'

- name: Install common packages
  ansible.builtin.package:
    name: "{{ core_packages + core_extra_packages }}"
    state: present
  when: (core_packages + core_extra_packages) | length > 0
