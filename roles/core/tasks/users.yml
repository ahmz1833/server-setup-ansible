---
- name: Get all human users (UID >= 1000)
  ansible.builtin.getent:
    database: passwd

- name: Build list of human users
  ansible.builtin.set_fact:
    core_existing_users: >-
      {% set users = [] -%}
      {% for key, val in ansible_facts.getent_passwd.items() -%}
      {% if val[1] is defined and (val[1] | int) >= 1000 and (val[1] | int) < 60000 -%}
      {% set _ = users.append(key) -%}
      {% endif -%}
      {% endfor -%}
      {{ users }}

- name: Remove unknown users
  ansible.builtin.user:
    name: "{{ item }}"
    state: absent
    remove: true
  loop: "{{ core_existing_users }}"
  when:
    - item not in (core_users_whitelist | default([]))
    - item not in (core_users | map(attribute='name') | list)
    - item != core_primary_user

- name: Remove sudo privileges for deleted users
  ansible.builtin.file:
    path: "/etc/sudoers.d/{{ item }}"
    state: absent
  loop: "{{ core_existing_users }}"
  when:
    - item not in (core_users_whitelist | default([]))
    - item not in (core_users | map(attribute='name') | list)
    - item != core_primary_user

- name: Ensure user groups exist
  ansible.builtin.group:
    name: "{{ item.group }}"
    state: present
  loop: "{{ core_users | selectattr('group', 'defined') | list }}"

- name: Create users
  ansible.builtin.user:
    name: "{{ item.name }}"
    state: present
    create_home: true
    shell: "{{ item.shell | default('/bin/bash') }}"
    groups: "{{ item.groups | default(omit) }}"
    append: "{{ item.append | default(true) }}"
    password: "{{ item.password | default(omit) }}"
    update_password: "{{ item.update_password | default('always' if item.password is defined else 'on_create') }}"
  loop: "{{ core_users }}"
  loop_control:
    label: "{{ item.name }}"

- name: Configure authorized keys
  ansible.posix.authorized_key:
    user: "{{ item.name }}"
    key: |
      {% for k in item.ssh_keys | default([]) %}
      {{ lookup('file', k) }}
      {% endfor %}
      {% if item.ssh_key is defined %}
      {{ item.ssh_key }}
      {% endif %}
    state: present
    manage_dir: true
    exclusive: true
  loop: "{{ core_users | selectattr('ssh_keys', 'defined') | list + core_users | selectattr('ssh_key', 'defined') | list | unique }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.ssh_keys is defined or item.ssh_key is defined

- name: Configure sudo privileges
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ item.name }}"
    content: "{{ item.name }} ALL=(ALL) {{ 'NOPASSWD:' if item.sudoer_no_pass | default(false) else '' }}ALL"
    owner: root
    group: root
    mode: '0440'
    validate: 'visudo -cf %s'
  loop: "{{ core_users | selectattr('sudoer', 'defined') | selectattr('sudoer') | list }}"
  loop_control:
    label: "{{ item.name }}"

- name: Remove sudo privileges for non-sudo users
  ansible.builtin.file:
    path: "/etc/sudoers.d/{{ item.name }}"
    state: absent
  loop: "{{ core_users }}"
  loop_control:
    label: "{{ item.name }}"
  when: not (item.sudoer | default(false))
