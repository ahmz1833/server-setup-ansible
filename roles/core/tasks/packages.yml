---
- name: Determine active APT mirrors by suite
  ansible.builtin.set_fact:
    _core_active_apt_mirrors: "{{ core_apt_mirrors if (core_set_apt_mirrors | bool) else {} }}"

- name: Configure Debian family APT mirrors
  when:
    - ansible_facts['os_family'] == 'Debian'
    - _core_active_apt_mirrors | length > 0
  block:
    - name: Find core OS APT source files
      ansible.builtin.find:
        paths:
          - /etc/apt/
          - /etc/apt/sources.list.d/
        patterns:
          - "sources.list"
          - "debian.sources"
          - "ubuntu.sources"
        use_regex: false
      register: core_apt_files

    - name: Backup APT source files before modification
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: "/etc/apt/{{ item.path | basename }}.bak.{{ ansible_facts['date_time']['epoch'] }}"
        remote_src: true
        force: false
        owner: root
        group: root
        mode: '0644'
      loop: "{{ core_apt_files.files | default([]) }}"
      loop_control:
        label: "{{ item.path }}"

    - name: Apply suite-based mirror replacements
      ansible.builtin.command: |
        {{ ansible_python_interpreter | default('python3') }} -c '
        import sys, json, os
        try:
            mirrors = json.loads(os.environ.get("MIRRORS_JSON", "{}"))
            files = json.loads(os.environ.get("FILES_JSON", "[]"))
        except Exception as e:
            sys.stderr.write("Failed to parse MIRRORS_JSON/FILES_JSON: %s\n" % e)
            sys.exit(1)
        changed = False
        def process_list_file(filepath):
            global changed
            with open(filepath, "r") as f:
                lines = f.readlines()
            out = []
            for line in lines:
                line_s = line.strip()
                if line_s.startswith("deb ") or line_s.startswith("deb-src "):
                    parts = line.split()
                    uri_idx = 1
                    if parts[1].startswith("["):
                        for i in range(1, len(parts)):
                            if parts[i].endswith("]"):
                                uri_idx = i + 1
                                break
                    if uri_idx < len(parts) and (uri_idx + 1) < len(parts):
                        old_uri = parts[uri_idx]
                        suite = parts[uri_idx + 1]
                        new_uri = mirrors.get(suite)
                        if not new_uri:
                            base_suite = suite.split("-")[0]
                            new_uri = mirrors.get(base_suite)
                        if new_uri and old_uri != new_uri:
                            parts[uri_idx] = new_uri
                            out.append(" ".join(parts) + "\n")
                            changed = True
                            continue
                out.append(line)
            with open(filepath, "w") as f:
                f.writelines(out)
        def process_sources_file(filepath):
            global changed
            with open(filepath, "r") as f:
                content = f.read()
            blocks = content.split("\n\n")
            out_blocks = []
            for block in blocks:
                if not block.strip():
                    continue
                lines = block.split("\n")
                suites = []
                uri_idx = -1
                old_uri = ""
                for i, line in enumerate(lines):
                    if line.startswith("Suites:"):
                        suites = line.split()[1:]
                    elif line.startswith("URIs:"):
                        uri_idx = i
                        old_uri = line.split()[1] if len(line.split()) > 1 else ""
                if suites and uri_idx != -1:
                    new_uri = None
                    for s in suites:
                        if s in mirrors:
                            new_uri = mirrors[s]
                            break
                        base_s = s.split("-")[0]
                        if base_s in mirrors:
                            new_uri = mirrors[base_s]
                            break
                    if new_uri and old_uri != new_uri:
                        lines[uri_idx] = f"URIs: {new_uri}"
                        changed = True
                out_blocks.append("\n".join(lines))
            with open(filepath, "w") as f:
                f.write("\n\n".join(out_blocks) + "\n")
        for f in files:
            if f.endswith(".list"):
                process_list_file(f)
            elif f.endswith(".sources"):
                process_sources_file(f)
        if changed:
            sys.exit(2)
        sys.exit(0)
        '
      environment:
        MIRRORS_JSON: "{{ _core_active_apt_mirrors | to_json }}"
        FILES_JSON: "{{ core_apt_files.files | map(attribute='path') | list | to_json }}"
      register: _core_apt_mirror_task
      changed_when: _core_apt_mirror_task.rc == 2
      failed_when: _core_apt_mirror_task.rc not in [0, 2]

- name: Update package cache (Debian family)
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: "{{ core_apt_cache_valid_time | default(3600) }}"
  when: ansible_facts['os_family'] == 'Debian'

- name: Install common packages
  ansible.builtin.package:
    name: "{{ core_packages + core_extra_packages }}"
    state: present
  when: (core_packages + core_extra_packages) | length > 0
