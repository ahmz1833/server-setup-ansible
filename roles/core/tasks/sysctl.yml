---
- name: Build effective sysctl base (optional BBR keys)
  ansible.builtin.set_fact:
    _core_sysctl_base_effective: >-
      {{
        core_sysctl_base
        if (core_sysctl_enable_bbr | default(true) | bool)
        else (
          core_sysctl_base
          | dict2items
          | rejectattr('key', 'equalto', 'net.core.default_qdisc')
          | rejectattr('key', 'equalto', 'net.ipv4.tcp_congestion_control')
          | items2dict
        )
      }}

- name: Build current sysctl rules
  ansible.builtin.set_fact:
    core_sysctl: >-
      {{
        _core_sysctl_base_effective
        | combine(core_sysctl_extra)
        | combine({
            'net.ipv6.conf.all.disable_ipv6': ('0' if core_enable_ipv6 else '1'),
            'net.ipv6.conf.default.disable_ipv6': ('0' if core_enable_ipv6 else '1'),
            'net.ipv6.conf.lo.disable_ipv6': ('0' if core_enable_ipv6 else '1'),
            'net.ipv4.ip_forward': ('1' if core_sysctl_ip_forward else '0'),
          })
        | combine(
            {'net.ipv6.conf.all.forwarding': '1'}
            if (core_sysctl_ip_forward and core_enable_ipv6)
            else {}
          )
      }}

- name: Apply exclusive sysctl settings via dedicated file
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-ansible-core.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      # Managed by Ansible - DO NOT EDIT MANUALLY
      {% for key, value in core_sysctl | dictsort %}
      {{ key }} = {{ value }}
      {% endfor %}
  notify: Reload sysctl
