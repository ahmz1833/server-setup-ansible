---
# Meta Variables (inherited from playbook-level)
core_is_iran: '{{ is_iran | default(false) }}'
core_enable_ipv6: '{{ enable_ipv6 | default(false) }}'
core_download_locally: '{{ download_locally | default(false) }}'
core_primary_user: '{{ primary_user | default("root") }}'

# -----------------------------------------------------------------------------
# System Configuration
# -----------------------------------------------------------------------------
# Timezone is automatically determined by 'core_is_iran' unless explicitly overridden
core_timezone: "{{ 'Asia/Tehran' if core_is_iran else 'Etc/UTC' }}"
core_hostname: "{{ inventory_hostname }}"

# DNS / Hosts Configuration
core_manage_nameservers: "{{ (core_nameservers | length) > 0 }}"
core_nameservers: []

# Managed exclusively inside the role-managed section in /etc/hosts
core_hosts_list: []

# -----------------------------------------------------------------------------
# Package Configuration
# -----------------------------------------------------------------------------
# APT Mirrors Configuration
core_set_apt_mirrors: "{{ core_is_iran }}"

core_base_mirror_ubuntu: "https://ir.ubuntu.sindad.cloud"
core_base_mirror_debian: "https://mirrors.pardisco.co/debian"

# yamllint disable rule:colons
core_apt_mirrors:
  # Ubuntu
  resolute: "{{ core_base_mirror_ubuntu }}"  # 26.04 LTS
  questing: "{{ core_base_mirror_ubuntu }}"  # 25.10
  plucky  : "{{ core_base_mirror_ubuntu }}"  # 25.04
  oracular: "{{ core_base_mirror_ubuntu }}"  # 24.10
  noble   : "{{ core_base_mirror_ubuntu }}"  # 24.04 LTS
  mantic  : "{{ core_base_mirror_ubuntu }}"  # 23.10
  lunar   : "{{ core_base_mirror_ubuntu }}"  # 23.04
  kinetic : "{{ core_base_mirror_ubuntu }}"  # 22.10
  jammy   : "{{ core_base_mirror_ubuntu }}"  # 22.04 LTS
  impish  : "{{ core_base_mirror_ubuntu }}"  # 21.10
  hirsute : "{{ core_base_mirror_ubuntu }}"  # 21.04
  groovy  : "{{ core_base_mirror_ubuntu }}"  # 20.10
  focal   : "{{ core_base_mirror_ubuntu }}"  # 20.04 LTS
  eoan    : "{{ core_base_mirror_ubuntu }}"  # 19.10
  disco   : "{{ core_base_mirror_ubuntu }}"  # 19.04
  cosmic  : "{{ core_base_mirror_ubuntu }}"  # 18.10
  bionic  : "{{ core_base_mirror_ubuntu }}"  # 18.04 LTS
  artful  : "{{ core_base_mirror_ubuntu }}"  # 17.10
  zesty   : "{{ core_base_mirror_ubuntu }}"  # 17.04
  yakkety : "{{ core_base_mirror_ubuntu }}"  # 16.10
  xenial  : "{{ core_base_mirror_ubuntu }}"  # 16.04 LTS
  # Debian
  bullseye:           "{{ core_base_mirror_debian }}"
  bullseye-security:  "{{ core_base_mirror_debian }}-security"
  bookworm:           "{{ core_base_mirror_debian }}"
  bookworm-security:  "{{ core_base_mirror_debian }}-security"
  trixie:             "{{ core_base_mirror_debian }}"
  trixie-security:    "{{ core_base_mirror_debian }}-security"
# yamllint enable rule:colons

# APT cache configuration
# cache_valid_time: Skip apt-get update if cache is newer than this (seconds)
# Set to 0 to always update, or high value to minimize updates
core_apt_cache_valid_time: 3600

# Base packages to install on all systems
core_packages:
  - curl
  - wget
  - git
  - tar
  - unzip
  - jq
  - htop
  - ca-certificates
  - net-tools
  - ipset
  - vim
  - iotop
  - iftop
  - rsync
  - tzdata

# Additional packages (role consumer can extend)
core_extra_packages: []

# -----------------------------------------------------------------------------
# NTP Configuration
# -----------------------------------------------------------------------------
core_manage_ntp: true
core_ntp_servers:
  - "0.pool.ntp.org"
  - "1.pool.ntp.org"
  - "2.pool.ntp.org"
  - "3.pool.ntp.org"
core_ntp_fallback_servers:
  - "time.cloudflare.com"
  - "time.google.com"

# -----------------------------------------------------------------------------
# Swap Configuration
# -----------------------------------------------------------------------------
core_manage_swap: true
core_swap_enabled: false
core_swap_file: "/swapfile"
core_swap_size_mb: 2048

# -----------------------------------------------------------------------------
# User Management
# -----------------------------------------------------------------------------
core_manage_users: true

# Users List
# Example:
# core_users:
#   - name: admin
#     password: '<Hash made by mkpasswd>' # if provided, password will be updated. Must be provided when creating.
#     groups: ["sudo", "docker"]
#     append: <true/false>                # Default: true (if true, do not remove user from already joined groups)
#     shell: /bin/bash
#     ssh_keys:
#       - "~/.ssh/deploy_key.pub"
#     sudoer: true                        # add special sudoer (not relate to sudo group)
#     sudoer_no_pass: true                # (requires special sudoer be true)
core_users: []

# Usernames to never remove (protection list)
core_users_whitelist: []

# -----------------------------------------------------------------------------
# SSH Configuration
# -----------------------------------------------------------------------------
core_manage_ssh: true

# SSH port detection: inventory > ssh config > default 22
core_ssh_port: >-
  {{
    ansible_facts['port'] | default(ansible_facts['ssh_port'] | default(
      lookup('pipe', 'ssh -G ' ~ inventory_hostname ~ ' | grep "^port " | cut -d" " -f2', errors='ignore')
      | default('22', true),
      true
    )) | int
  }}

# User to verify has SSH keys before disabling password auth
core_ssh_ensure_pub_key_user: "{{ core_primary_user | default(omit) }}"

# SSH hardening options
core_ssh_password_auth: false
core_ssh_permit_root_login: false
core_ssh_x11_forwarding: false
core_ssh_port_forwarding: true
core_ssh_max_auth_tries: 3
core_ssh_login_grace_time: 30

# Restrict SSH to specific users (empty = no restriction)
core_ssh_allow_users: []

# -----------------------------------------------------------------------------
# Sysctl / Kernel Tuning
# -----------------------------------------------------------------------------
core_manage_sysctl: true

# BBR needs a kernel with tcp_bbr; set false on minimal VPS / old kernels to avoid
# sysctl --system failing on net.ipv4.tcp_congestion_control / default_qdisc.
core_sysctl_enable_bbr: true

# Base sysctl settings
core_sysctl_base:
  # Security
  net.ipv4.tcp_syncookies: 1
  net.ipv4.conf.all.accept_source_route: 0
  net.ipv4.conf.default.accept_source_route: 0
  net.ipv4.conf.all.accept_redirects: 0
  net.ipv4.conf.default.accept_redirects: 0
  net.ipv4.conf.all.secure_redirects: 0
  net.ipv4.conf.default.secure_redirects: 0
  net.ipv4.conf.all.send_redirects: 0
  net.ipv4.conf.default.send_redirects: 0
  net.ipv4.icmp_echo_ignore_broadcasts: 1
  net.ipv4.icmp_ignore_bogus_error_responses: 1
  net.ipv4.conf.all.rp_filter: 1
  net.ipv4.conf.default.rp_filter: 1
  net.ipv4.conf.all.log_martians: 1
  # Performance & TCP BBR
  net.core.default_qdisc: fq
  net.ipv4.tcp_congestion_control: bbr
  net.core.somaxconn: 65535
  net.core.netdev_max_backlog: 65535
  net.ipv4.tcp_max_syn_backlog: 65535
  net.ipv4.tcp_fin_timeout: 15
  net.ipv4.tcp_keepalive_time: 300
  net.ipv4.tcp_keepalive_probes: 5
  net.ipv4.tcp_keepalive_intvl: 15
  # Swap tuning
  vm.swappiness: 10
  vm.vfs_cache_pressure: 50

# Additional sysctl settings (merged with base)
core_sysctl_extra: {}

# Enable IP forwarding (required for NAT/routing)
core_sysctl_ip_forward: false

# -----------------------------------------------------------------------------
# IPSet Configuration
# -----------------------------------------------------------------------------
core_manage_ipset: true
core_ipset_data_dir: "/var/lib/ipset"

# Example:
# core_ipsets:
#   - name: cloudflare-v4
#     type: hash:net
#     family: inet
#     entries:
#       - "173.245.48.0/20"
#       - "103.21.244.0/22"
#
#   - name: cloudflare-v4
#     type: hash:net
#     family: inet
#     url: "https://www.cloudflare.com/ips-v4"
#     cron: "0 4 * * *"
core_ipsets: []

# -----------------------------------------------------------------------------
# Firewall Configuration (INPUT chain only)
# -----------------------------------------------------------------------------
core_manage_firewall: true
core_firewall_default_policy: "DROP"
core_firewall_ssh_src: "0.0.0.0/0"
core_firewall_ssh_src_v6: "::/0"
core_firewall_block_scans: true
core_firewall_allow_ping: true

# Example:
# core_firewall_rules:
#   - { port: 80, comment: "HTTP" }
#   - { port: 443, comment: "HTTPS" }
#   - { port: 9100, src: "10.0.0.0/8", comment: "Metrics" }
#   - { port: 8080, ipset: "trusted-nets", comment: "From trusted" }
#   - { port: 3000, v4_only: true, comment: "IPv4 only" }
core_firewall_rules: []

# -----------------------------------------------------------------------------
# Fail2ban Configuration
# -----------------------------------------------------------------------------
core_fail2ban_enabled: true

# Global fail2ban settings
core_fail2ban_bantime: 3600
core_fail2ban_findtime: 600
core_fail2ban_maxretry: 5

# Ignored IPs (never ban)
core_fail2ban_ignoreip:
  - "127.0.0.1/8"
  - "::1"

# SSH fail2ban settings
core_fail2ban_ssh_maxretry: 3

# Additional jails
# Example:
# core_fail2ban_extra_jails:
#   nginx-http-auth:
#     enabled: true
#     filter: nginx-http-auth
#     logpath: /var/log/nginx/error.log
#     maxretry: 3
core_fail2ban_extra_jails: {}

# -----------------------------------------------------------------------------
# Cron Management
# -----------------------------------------------------------------------------
core_manage_cron: true

# Exclusive mode: remove cron jobs with our prefix that aren't in our list
core_cron_exclusive: true
core_cron_prefix: "ansible-"  # All managed crons will have this prefix

# User-defined cron jobs
# Example:
# core_cron_jobs:
#   - name: "backup-daily"
#     job: "/opt/scripts/backup.sh"
#     hour: "3"
#     minute: "0"
#
#   - name: "cleanup-temp"
#     job: "find /tmp -type f -mtime +7 -delete"
#     special_time: daily
#
#   - name: "disabled-job"
#     job: "/some/script.sh"
#     disabled: true
core_cron_jobs: []

# Auto-generate cron jobs for IPSet URL updates
# When true, ipsets with 'url' and 'cron' will automatically get cron jobs
core_cron_auto_ipset: true
