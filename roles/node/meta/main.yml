---
galaxy_info:
  role_name: node
  author: AHMZ
  description: >-
    Node-level services — sing-box proxy/tunnel, GOST tunnel, Docker
    engine (static tgz from Docker, glibc-linked), Prometheus node_exporter,
    shell bootstrap and utility tools. Requires systemd. Static Docker install
    is refused on Alpine/musl; override node_tools_packages on RPM-based distros
    where Debian package names differ.
  license: MIT
  min_ansible_version: "2.14"
  platforms:
    - name: Ubuntu
      versions:
        - focal
        - jammy
        - noble
    - name: Debian
      versions:
        - bullseye
        - bookworm
        - trixie
    - name: EL
      versions:
        - "8"
        - "9"
        - "10"
  galaxy_tags:
    - docker
    - proxy
    - tunnel
    - monitoring
    - tools

dependencies:
  - role: asset
