---
- name: Check if sing-box is installed
  ansible.builtin.command: which sing-box
  register: node_singbox_check
  ignore_errors: true
  changed_when: false

- name: Set sing-box binary path
  ansible.builtin.set_fact:
    node_singbox_bin_path: "{{ node_singbox_check.stdout | default('/usr/local/bin/sing-box', true) }}"

- name: Download and extract sing-box archive
  when: node_singbox_check.rc != 0
  block:
    - name: Download and extract sing-box archive
      ansible.builtin.unarchive:
        src: "https://github.com/SagerNet/sing-box/releases/download/v{{ node_singbox_version }}/sing-box-{{ node_singbox_version }}-linux-amd64.tar.gz"
        dest: "/tmp/"
        remote_src: true
      delegate_to: "{{ 'localhost' if node_download_locally | default(false) else inventory_hostname }}"
      run_once: "{{ node_download_locally | default(false) }}"
      become: "{{ not (node_download_locally | default(false)) }}"

    - name: Copy sing-box binary to target node
      ansible.builtin.copy:
        src: "/tmp/sing-box-{{ node_singbox_version }}-linux-amd64/sing-box"
        dest: "/usr/local/bin/sing-box"
        mode: '0755'
        remote_src: "{{ not (node_download_locally | default(false)) }}"

- name: Create sing-box config directory
  ansible.builtin.file:
    path: /etc/sing-box
    state: directory
    mode: '0755'

- name: Generate sing-box configuration
  ansible.builtin.template:
    src: singbox_config.json.j2
    dest: /etc/sing-box/config.json
    mode: '0644'
  notify: Restart singbox

- name: Configure sing-box systemd service
  ansible.builtin.template:
    src: singbox.service.j2
    dest: /etc/systemd/system/sing-box.service
    mode: '0644'
  notify: Restart singbox

- name: Manage sing-box service state
  ansible.builtin.systemd:
    name: sing-box
    state: "{{ 'started' if node_singbox_enabled | default(false) else 'stopped' }}"
    enabled: "{{ node_singbox_enabled | default(false) }}"
    daemon_reload: true

- name: Force flush handlers to start tunnel immediately
  ansible.builtin.meta: flush_handlers
  when: node_singbox_enabled | default(false)
