---
- name: Set sing-box release tarball libc suffix (Alpine/musl vs glibc)
  ansible.builtin.set_fact:
    node_singbox_rel_libc_suffix: >-
      {{
        '-musl'
        if (node_singbox_libc | default('auto')) == 'musl'
        else (
          ''
          if (node_singbox_libc | default('auto')) == 'glibc'
          else ('-musl' if ansible_facts.get('os_family') == 'Alpine' else '')
        )
      }}

- name: Install sing-box via remote_asset role
  ansible.builtin.include_role:
    name: ahmz.server_setup.asset
  vars:
    asset_name: "sing-box"
    asset_version: "{{ node_singbox_version }}"
    asset_url: "github.com/SagerNet/sing-box/releases/download/v%v/sing-box-%v-linux-{{ node_arch_go_platform_suffix ~ node_singbox_rel_libc_suffix }}.tar.gz"
    asset_extract: true
    asset_extract_src: "sing-box-%v-linux-{{ node_arch_go_platform_suffix }}{{ node_singbox_rel_libc_suffix }}/sing-box"
    asset_version_cmd: "version"
    asset_version_regex: 'sing-box version ([0-9.]+)'
    asset_service_stop: "sing-box"
    asset_download_locally: "{{ node_download_locally | default(false) }}"
    asset_register_path_var: "node_singbox_bin_path"

- name: Create sing-box directories
  ansible.builtin.file:
    path: /etc/sing-box
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Link Conversion Block
  when: (node_singbox_outbounds.links | default([])) | length > 0
  delegate_to: localhost
  run_once: true
  become: false
  block:
    - name: Check if vpnparser is available
      ansible.builtin.command: which vpnparser
      register: _node_vpnparser_check
      changed_when: false
      failed_when: false

    - name: Fail if vpnparser is not installed
      ansible.builtin.fail:
        msg: |
          vpnparser is required but not found in PATH.
          Install it with: go install github.com/ahmz1833/vpnparser@latest
          Ensure $GOPATH/bin is in your PATH.
      when: _node_vpnparser_check.rc != 0

    - name: Parse links with vpnparser
      ansible.builtin.command: "vpnparser sing '{{ item }}'"
      loop: "{{ node_singbox_outbounds.links }}"
      register: _node_parsed_links_raw
      changed_when: false

    - name: Extract pure proxy outbounds from parsed JSON
      ansible.builtin.set_fact:
        node_singbox_dynamic_proxies: >-
          {%- set proxies = [] -%}
          {%- for res in _node_parsed_links_raw.results -%}
          {%-   set parsed = res.stdout | regex_replace('^[^{]*', '') | from_json -%}
          {%-   set link_remark = res.item.split('#', 1)[1] | urldecode if '#' in res.item else 'proxy' -%}
          {%-   set _ = parsed.update({'tag': link_remark}) -%}
          {%-   set _ = proxies.append(parsed) -%}
          {%- endfor -%}
          {{ proxies }}

- name: Generate sing-box configuration
  ansible.builtin.template:
    src: singbox_config.json.j2
    dest: /etc/sing-box/config.json
    mode: '0600'
    owner: root
    group: root
    validate: "{{ node_singbox_bin_path }} check -c %s"
  notify: Restart singbox

- name: Configure sing-box systemd service
  ansible.builtin.template:
    src: singbox.service.j2
    dest: /etc/systemd/system/sing-box.service
    mode: '0644'
  notify:
    - "systemd daemon-reload"
    - Restart singbox

- name: Manage sing-box service state
  ansible.builtin.systemd:
    name: sing-box
    state: "{{ node_singbox_enabled | ternary('started', 'stopped') }}"
    enabled: "{{ node_singbox_enabled }}"
    daemon_reload: true

- name: Force flush handlers to start tunnel immediately
  ansible.builtin.meta: flush_handlers
  when: node_singbox_enabled | default(false)
