---
- name: Check if sing-box is installed
  ansible.builtin.command: sing-box version
  register: node_singbox_check
  ignore_errors: true
  changed_when: false

- name: Download sing-box archive locally
  ansible.builtin.get_url:
    url: "https://github.com/SagerNet/sing-box/releases/download/v{{ node_singbox_version }}/sing-box-{{ node_singbox_version }}-linux-amd64.tar.gz"
    dest: "/tmp/sing-box-{{ node_singbox_version }}-linux-amd64.tar.gz"
    mode: '0644'
  delegate_to: localhost
  become: false
  run_once: true
  when: node_singbox_check.rc != 0

- name: Extract sing-box archive locally
  ansible.builtin.unarchive:
    src: "/tmp/sing-box-{{ node_singbox_version }}-linux-amd64.tar.gz"
    dest: "/tmp/"
    remote_src: true
  delegate_to: localhost
  become: false
  run_once: true
  when: node_singbox_check.rc != 0

- name: Copy sing-box binary to target node
  ansible.builtin.copy:
    src: "/tmp/sing-box-{{ node_singbox_version }}-linux-amd64/sing-box"
    dest: "/usr/local/bin/sing-box"
    mode: '0755'
  when: node_singbox_check.rc != 0

- name: Create sing-box config directory
  ansible.builtin.file:
    path: /etc/sing-box
    state: directory
    mode: '0755'

- name: Generate sing-box configuration
  ansible.builtin.template:
    src: singbox_config.json.j2
    dest: /etc/sing-box/config.json
    mode: '0644'
  notify: Restart singbox

- name: Configure sing-box systemd service
  ansible.builtin.template:
    src: singbox.service.j2
    dest: /etc/systemd/system/sing-box.service
    mode: '0644'
  notify: Restart singbox

- name: Manage sing-box service state
  ansible.builtin.systemd:
    name: sing-box
    state: "{{ 'started' if node_singbox_enabled | default(false) else 'stopped' }}"
    enabled: "{{ node_singbox_enabled | default(false) }}"
    daemon_reload: true

- name: Force flush handlers to start tunnel immediately
  ansible.builtin.meta: flush_handlers
  when: node_singbox_enabled | default(false)
