---
- name: Check if Docker is installed
  ansible.builtin.command: which docker
  register: node_docker_check
  ignore_errors: true
  changed_when: false

- name: Set Docker binary path
  ansible.builtin.set_fact:
    node_docker_bin_path: "{{ node_docker_check.stdout | default('/usr/bin/docker', true) }}"

- name: Get Docker version
  ansible.builtin.command:
    cmd: "{{ node_docker_bin_path }} --version"
  register: node_docker_version_check
  changed_when: false
  when: node_docker_check.rc == 0

- name: Display Docker version
  ansible.builtin.debug:
    msg: "Docker installed: {{ node_docker_version_check.stdout | default('not installed') }}"
  when: node_docker_check.rc == 0

- name: Extract Docker version number
  ansible.builtin.set_fact:
    node_docker_current_version: "{{ node_docker_version_check.stdout | regex_search('[0-9]+\\.[0-9]+\\.[0-9]+') }}"
  when: node_docker_check.rc == 0

- name: Determine if Docker installation is required
  ansible.builtin.set_fact:
    node_docker_needs_install: >-
      {{ node_docker_check.rc != 0 or
         (node_docker_min_version is defined and
          node_docker_current_version is defined and
          node_docker_current_version is version(node_docker_min_version, '<')) }}

- name: Install Docker
  when: node_docker_needs_install
  block:
    - name: Download Docker install script
      ansible.builtin.get_url:
        url: https://get.docker.com
        dest: /tmp/get-docker.sh
        mode: '0755'

    - name: Execute Docker install script
      ansible.builtin.command:
        cmd: /tmp/get-docker.sh
      register: node_docker_install_result
      changed_when: node_docker_install_result.rc == 0

    - name: Clean up Docker install script
      ansible.builtin.file:
        path: /tmp/get-docker.sh
        state: absent

    - name: Remove Docker APT repository source
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/docker.list
        state: absent

- name: Check if Docker Compose (plugin) is installed
  ansible.builtin.command: docker compose version
  register: node_docker_compose_plugin_check
  ignore_errors: true
  changed_when: false

- name: Install Docker Compose plugin
  ansible.builtin.apt:
    name: docker-compose-plugin
    state: present
    update_cache: true
    cache_valid_time: 3600
  when:
    - node_docker_compose_plugin_check.rc != 0

- name: Install/Update Docker Compose standalone via remote_asset role
  ansible.builtin.include_role:
    name: ahmz.server_setup.asset
  vars:
    asset_name: "docker-compose"
    asset_version: "{{ node_docker_compose_version }}"
    asset_url: "github.com/docker/compose/releases/download/v%v/docker-compose-linux-x86_64"
    asset_extract: false
    asset_version_cmd: "--version"
    asset_version_regex: 'v?([0-9]+\.[0-9]+\.[0-9]+)'
    asset_download_locally: "{{ node_download_locally | default(false) }}"
    asset_register_path_var: "node_docker_compose_bin_path"
  when: node_docker_compose_install

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ node_primary_user }}"
    groups: docker
    append: true
  when: node_primary_user != 'root'

- name: Create Docker configuration directory
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Configure Docker daemon
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    mode: '0644'
    owner: root
    group: root
  notify: Restart docker

- name: Manage Docker service state
  ansible.builtin.systemd:
    name: docker
    state: "{{ node_docker_enabled | ternary('started', 'stopped') }}"
    enabled: "{{ node_docker_enabled }}"
    daemon_reload: true
