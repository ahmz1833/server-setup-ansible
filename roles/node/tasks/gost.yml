---
- name: Check if gost is installed
  ansible.builtin.command: gost -V
  register: node_gost_check
  ignore_errors: true
  changed_when: false

- name: Download gost archive locally
  ansible.builtin.get_url:
    url: "https://github.com/go-gost/gost/releases/download/v{{ node_gost_version }}/gost_{{ node_gost_version }}_linux_amd64.tar.gz"
    dest: "/tmp/gost-{{ node_gost_version }}-linux-amd64.tar.gz"
    mode: '0644'
  delegate_to: localhost
  become: false
  run_once: true
  when: node_gost_check.rc != 0

- name: Create temporary directory for gost extraction locally
  ansible.builtin.file:
    path: "/tmp/gost-{{ node_gost_version }}"
    state: directory
    mode: '0755'
  delegate_to: localhost
  become: false
  run_once: true
  when: node_gost_check.rc != 0

- name: Extract gost archive locally
  ansible.builtin.unarchive:
    src: "/tmp/gost-{{ node_gost_version }}-linux-amd64.tar.gz"
    dest: "/tmp/gost-{{ node_gost_version }}"
    remote_src: true
  delegate_to: localhost
  become: false
  run_once: true
  when: node_gost_check.rc != 0

- name: Copy gost binary to target node
  ansible.builtin.copy:
    src: "/tmp/gost-{{ node_gost_version }}/gost"
    dest: "/usr/local/bin/gost"
    mode: '0755'
  when: gost_check.rc != 0

- name: Create gost configuration directory
  ansible.builtin.file:
    path: /etc/gost
    state: directory
    mode: '0755'

- name: Generate gost configuration
  ansible.builtin.copy:
    content: "{{ node_gost_config | to_nice_yaml(indent=2) }}"
    dest: /etc/gost/config.yml
    mode: '0644'
  notify: Restart gost

- name: Configure gost systemd service
  ansible.builtin.template:
    src: gost.service.j2
    dest: /etc/systemd/system/gost.service
    mode: '0644'
  notify: Restart gost

- name: Manage gost service state
  ansible.builtin.systemd:
    name: gost
    state: "{{ 'started' if node_gost_enabled | default(false) else 'stopped' }}"
    enabled: "{{ node_gost_enabled | default(false) }}"
    daemon_reload: true
