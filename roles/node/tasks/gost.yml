---
- name: Install/Update GOST via remote_asset role
  ansible.builtin.include_role:
    name: ahmz.server_setup.asset
  vars:
    asset_name: "gost"
    asset_version: "{{ node_gost_version }}"
    asset_url: "github.com/go-gost/gost/releases/download/v%v/gost_%v_linux_{{ node_arch_go_platform_suffix }}.tar.gz"
    asset_extract: true
    asset_extract_src: "gost"
    asset_version_cmd: "-V"
    asset_version_regex: 'gost\s+v?([0-9.]+)'
    asset_service_stop: "gost"
    asset_download_locally: "{{ node_download_locally | default(false) }}"
    asset_register_path_var: "node_gost_bin_path"

- name: Create GOST configuration directory
  ansible.builtin.file:
    path: /etc/gost
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Generate GOST configuration
  ansible.builtin.copy:
    content: "{{ node_gost_config | to_nice_yaml(indent=2) }}"
    dest: /etc/gost/config.yml
    mode: '0600'
    owner: root
    group: root
  notify: Restart gost
  when: node_gost_config | length > 0

- name: Remove GOST configuration if empty
  ansible.builtin.file:
    path: /etc/gost/config.yml
    state: absent
  notify: Restart gost
  when: node_gost_config | length == 0

- name: Configure GOST systemd service
  ansible.builtin.template:
    src: gost.service.j2
    dest: /etc/systemd/system/gost.service
    mode: '0644'
  notify:
    - "systemd daemon-reload"
    - Restart gost

- name: Manage GOST service state
  ansible.builtin.systemd:
    name: gost
    state: "{{ node_gost_enabled | ternary('started', 'stopped') }}"
    enabled: "{{ node_gost_enabled }}"
    daemon_reload: true
