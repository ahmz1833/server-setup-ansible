---
sandbox_managed: true

# Dedicated port for sandbox SSH access (to separate from admin SSH)
# Note: You must add this port to `core_firewall_rules` in your playbook
sandbox_ssh_port: 2222

# Enforce exclusive mode: remove any sandbox-* containers not defined in the list
sandbox_prune: false

# The shared host user that accepts incoming SSH connections
sandbox_shared_user: "sandbox"

# List of virtual users mapped to Docker containers (logical names, not Linux logins).
# Container name: sandbox-<name>. Default image if omitted: ubuntu:24.04.
# Default bind: /home/<sandbox_shared_user>/<name> -> container /home/<name>
# Host user for SSH is always sandbox_shared_user (e.g. ssh -p PORT sandbox@host).
# Example:
# sandbox_users:
#   - name: "guest1"
#     image: "ubuntu:24.04"
#     shell: "/bin/zsh"
#     ssh_keys:
#       - "ssh-rsa AAAAB3..."
#     ports:
#       - "127.0.0.1:8081:80"
#     memory: "512m"
#     cpus: 0.5
#     # volumes: ["/custom/path:/home/guest1"]
#     # working_dir: "/workspace"
#     # env: {"CUSTOM_VAR": "value"}

sandbox_users: []
