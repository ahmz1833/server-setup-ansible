---
# Systemd daemon reload - use 'listen' to allow multiple triggers
- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
  when: ansible_facts.get('service_mgr', '') == 'systemd'
  listen: "systemd daemon-reload"
  become: true

# Flexible certificate reload handler
- name: Execute custom reload command
  ansible.builtin.command: "{{ acme_reload_command }}"
  listen: "reload certificates"
  when: acme_reload_command | default('') | length > 0
  changed_when: true
  become: true

- name: Reload service
  ansible.builtin.service:
    name: "{{ acme_reload_service }}"
    state: reloaded
  listen: "reload certificates"
  when:
    - acme_reload_command | default('') | length == 0
    - acme_reload_service | default('') | length > 0
  become: true
