---
- name: Initiate ACME DNS-01 challenge locally
  community.crypto.acme_certificate:
    account_key_src: "{{ acme_local_workspace }}/account.key"
    account_email: "{{ acme_account_email }}"
    src: "{{ acme_local_cert_dir }}/domain.csr"
    cert: "{{ acme_local_cert_dir }}/cert.pem"
    challenge: dns-01
    acme_directory: "{{ acme_directory_url }}"
    acme_version: 2
    terms_agreed: true
    modify_account: false
  register: acme_challenge
  delegate_to: localhost
  become: false

- name: Prompt for DNS and validate    # noqa: no-handler
  when: acme_challenge is changed
  block:
    - name: Refuse DNS-01 in non-interactive mode
      ansible.builtin.fail:
        msg: >-
          DNS-01 needs manual TXT records (or external automation). This role does
          not create DNS records. Set acme_noninteractive false for interactive
          mode, use challenge http-01 with a reachable webroot, or issue certs
          another way in CI.
      when: acme_noninteractive | default(false) | bool

    - name: Prompt for manual DNS TXT record creation
      ansible.builtin.pause:
        prompt: |
          ╔══════════════════════════════════════════════════════════════════╗

          ║                    DNS-01 CHALLENGE                              ║

          ╚══════════════════════════════════════════════════════════════════╝

          Domain: {{ acme_current_cn }}
          {% if acme_current_all_domains | length > 1 %}

          SANs:   {{ acme_current_all_domains[1:] | join(', ') }}
          {% endif %}

          Please create the following DNS TXT record(s):

          {% for k, v in acme_challenge.challenge_data.items() %}
          Name: {{ v['dns-01'].record }}

          Value: {{ v['dns-01'].resource_value }}

          {% endfor %}

          Verify propagation (one per record):
          {% for k, v in acme_challenge.challenge_data.items() %}
          dig TXT {{ v['dns-01'].record }}
          {% endfor %}

          Press ENTER when all records have propagated globally.
      when:
        - acme_challenge.challenge_data is defined
        - not (acme_noninteractive | default(false) | bool)
      delegate_to: localhost
      become: false

    - name: Validate ACME challenge and fetch certificates
      community.crypto.acme_certificate:
        account_key_src: "{{ acme_local_workspace }}/account.key"
        account_email: "{{ acme_account_email }}"
        src: "{{ acme_local_cert_dir }}/domain.csr"
        cert: "{{ acme_local_cert_dir }}/cert.pem"
        fullchain: "{{ acme_local_cert_dir }}/fullchain.pem"
        challenge: dns-01
        acme_directory: "{{ acme_directory_url }}"
        acme_version: 2
        terms_agreed: true
        modify_account: false
        data: "{{ acme_challenge }}"
      delegate_to: localhost
      become: false
