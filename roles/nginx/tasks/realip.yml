---
# Resolve trusted proxies from multiple sources:
# - Direct CIDRs
# - IPSet references (reads from save files)
# - URL references (fetches at runtime)

- name: Initialize resolved trusted proxies list
  ansible.builtin.set_fact:
    nginx_resolved_proxies: []

- name: Combine base and extra trusted proxies
  ansible.builtin.set_fact:
    nginx_all_proxy_sources: "{{ nginx_trusted_proxies + nginx_trusted_proxies_extra }}"

# -----------------------------------------------------------------------------
# Process Direct CIDRs
# -----------------------------------------------------------------------------
- name: Extract direct CIDR entries
  ansible.builtin.set_fact:
    nginx_resolved_proxies: >-
      {{ nginx_resolved_proxies + [item] }}
  loop: "{{ nginx_all_proxy_sources | selectattr('ipset', 'undefined') | selectattr('url', 'undefined') | list }}"
  when: item is string

# -----------------------------------------------------------------------------
# Process IPSet References
# -----------------------------------------------------------------------------
- name: Get IPSet reference entries
  ansible.builtin.set_fact:
    nginx_ipset_refs: >-
      {{ nginx_all_proxy_sources | selectattr('ipset', 'defined') | map(attribute='ipset') | list }}

- name: Read IPSet save files
  ansible.builtin.slurp:
    src: "{{ nginx_ipset_data_dir }}/{{ item }}.save"
  register: nginx_ipset_contents
  loop: "{{ nginx_ipset_refs }}"
  when: nginx_ipset_refs | length > 0
  failed_when: false

- name: Parse IPSet entries
  ansible.builtin.set_fact:
    nginx_resolved_proxies: >-
      {%- set result = nginx_resolved_proxies -%}
      {%- for ipset_file in nginx_ipset_contents.results | default([]) -%}
        {%- if ipset_file.content is defined -%}
          {%- set content = ipset_file.content | b64decode -%}
          {%- for line in content.split('\n') -%}
            {%- if line.startswith('add ') -%}
              {%- set parts = line.split() -%}
              {%- if parts | length >= 3 -%}
                {%- set _ = result.append(parts[2]) -%}
              {%- endif -%}
            {%- endif -%}
          {%- endfor -%}
        {%- endif -%}
      {%- endfor -%}
      {{ result }}
  when: nginx_ipset_contents.results is defined

# -----------------------------------------------------------------------------
# Process URL References
# -----------------------------------------------------------------------------
- name: Get URL reference entries
  ansible.builtin.set_fact:
    nginx_url_refs: >-
      {{ nginx_all_proxy_sources | selectattr('url', 'defined') | map(attribute='url') | list }}

- name: Fetch trusted proxies from URLs
  ansible.builtin.uri:
    url: "{{ item }}"
    return_content: true
    timeout: 30
  register: nginx_url_fetch_results
  loop: "{{ nginx_url_refs }}"
  when: nginx_url_refs | length > 0
  failed_when: false
  delegate_to: localhost
  become: false
  run_once: true

- name: Parse URL content for CIDRs
  ansible.builtin.set_fact:
    nginx_resolved_proxies: >-
      {%- set result = nginx_resolved_proxies -%}
      {%- for url_result in nginx_url_fetch_results.results | default([]) -%}
        {%- if url_result.content is defined -%}
          {%- for line in url_result.content.split('\n') -%}
            {%- set trimmed = line | trim -%}
            {%- if trimmed and not trimmed.startswith('#') -%}
              {%- if trimmed | regex_search('^[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+(/[0-9]+)?$') or
                     trimmed | regex_search('^[0-9a-fA-F:]+(/[0-9]+)?$') -%}
                {%- set _ = result.append(trimmed) -%}
              {%- endif -%}
            {%- endif -%}
          {%- endfor -%}
        {%- endif -%}
      {%- endfor -%}
      {{ result }}
  when: nginx_url_refs | length > 0

# -----------------------------------------------------------------------------
# Deduplicate and Finalize
# -----------------------------------------------------------------------------
- name: Deduplicate resolved proxies
  ansible.builtin.set_fact:
    nginx_resolved_trusted_proxies: "{{ nginx_resolved_proxies | unique | list }}"

- name: Display resolved trusted proxies count
  ansible.builtin.debug:
    msg: "Resolved {{ nginx_resolved_trusted_proxies | length }} trusted proxy CIDRs"
    verbosity: 1

# -----------------------------------------------------------------------------
# Provisioning
# -----------------------------------------------------------------------------
- name: Configure real IP and trusted proxies
  ansible.builtin.template:
    src: realip.conf.j2
    dest: /etc/nginx/conf.d/realip.conf
    mode: '0644'
  notify: Reload nginx
