---
# -----------------------------------------------------------------------------
# Backup Existing Site Configurations
# -----------------------------------------------------------------------------
- name: Site Backup Block
  when: nginx_backup_enabled | default(true)
  block:
    - name: Find existing site configurations for backup
      ansible.builtin.find:
        paths: /etc/nginx/sites-available
        patterns: "*.conf"
        file_type: file
      register: nginx_existing_sites

    - name: Ensure site backup directory exists
      ansible.builtin.file:
        path: "{{ nginx_backup_dir }}/sites"
        state: directory
        mode: '0700'
        owner: root
        group: root

    - name: Backup existing site configurations
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: "{{ nginx_backup_dir }}/sites/{{ item.path | basename }}.bak.{{ ansible_facts['date_time']['epoch'] }}"
        remote_src: true
        mode: '0644'
      loop: "{{ nginx_existing_sites.files | default([]) }}"
      when: nginx_existing_sites.files | default([]) | length > 0

# -----------------------------------------------------------------------------
# Generate Site Configurations
# -----------------------------------------------------------------------------
- name: Generate site configs
  ansible.builtin.template:
    src: site.conf.j2
    dest: "/etc/nginx/sites-available/{{ item.domain }}.conf"
    mode: '0644'
  loop: "{{ nginx_sites }}"
  notify: Reload nginx

- name: Manage site links
  ansible.builtin.file:
    src: "{{ '/etc/nginx/sites-available/' ~ item.domain ~ '.conf' if item.enabled | default(true) else omit }}"
    dest: "/etc/nginx/sites-enabled/{{ item.domain }}.conf"
    state: "{{ 'link' if item.enabled | default(true) else 'absent' }}"
    mode: '0644'
  loop: "{{ nginx_sites }}"
  notify: Reload nginx

# -----------------------------------------------------------------------------
# Cleanup Unmanaged Sites
# -----------------------------------------------------------------------------
- name: Find all enabled site configurations
  ansible.builtin.find:
    paths:
      - /etc/nginx/sites-enabled
    file_type: any
  register: nginx_enabled_sites

- name: Disable unmanaged site configurations
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ nginx_enabled_sites.files | default([]) }}"
  vars:
    expected_configs: >-
      {{
        (nginx_sites | map(attribute='domain') | map('regex_replace', '^(.*)$', '\1.conf') | list)
        + (['default'] if not (nginx_remove_default_site | default(true)) else [])
      }}
  when: item.path | basename not in expected_configs
  notify: Reload nginx

# -----------------------------------------------------------------------------
# Validation and Service Management
# -----------------------------------------------------------------------------
- name: Validate Nginx configuration syntax (Guardrail)
  ansible.builtin.command: nginx -t
  changed_when: false

- name: Ensure nginx service
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: true

# -----------------------------------------------------------------------------
# Cleanup Old Site Backups (keep last 5 per site)
# -----------------------------------------------------------------------------
- name: Find old site backups
  ansible.builtin.find:
    paths: "{{ nginx_backup_dir }}/sites"
    patterns: "*.conf.bak.*"
    file_type: file
  register: nginx_site_backups
  when: nginx_backup_enabled | default(true)

- name: Group and cleanup old site backups
  ansible.builtin.shell: |
    set -o pipefail
    cd "{{ nginx_backup_dir }}/sites" || exit 0
    for prefix in $(ls -1 *.conf.bak.* 2>/dev/null | sed 's/\.bak\.[0-9]*$//' | sort -u); do
      ls -1t "${prefix}.bak."* 2>/dev/null | tail -n +6 | xargs -r rm -f
    done
  args:
    executable: /bin/bash
  changed_when: false
  when:
    - nginx_backup_enabled | default(true)
    - nginx_site_backups.files | default([]) | length > 0
